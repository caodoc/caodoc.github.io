<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1"/>

        <title> clock &ndash; caodoc </title>

		<link rel="stylesheet" media="(min-width: 350px)" type="text/css" href="./medium.css"/>
        <link rel="stylesheet" media="(max-width: 350px)" type="text/css" href="./small.css"/>
    </head>

    <body>
        <div id="container">
            <div id="warning"> Please use a bigger screen. </div>
            <div class="clock">
                <div class="hour">
                    <div class="hr" id="hr"></div>
                </div>
                <div class="min">
                    <div class="mn" id="mn"></div>
                </div>
                <div class="sec">
                    <div class="sc" id="sc"></div>
                </div>
            </div>
        </div>
        <script src="./script.js"></script>
    </body>
</html>
