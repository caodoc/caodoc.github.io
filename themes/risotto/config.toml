baseURL = "https://caodoc.is-a.dev"
theme = "risotto"
title = "caodoc"
author = "caodoc"
paginate = 3
languageCode = "en"
DefaultContentLanguage = "en"
enableInlineShortcodes = true
# prevent build failures when using Hugo's Instagram shortcode due to deprecated Instagram API.
# See https://github.com/gohugoio/hugo/issues/7228#issuecomment-714490456
ignoreErrors = ["error-remote-getjson"]

# Automatically add content sections to main menu
sectionPagesMenu = "main"

[params]
noindex = false

[params.theme]
palette = "mocha"

# Sidebar: about/bio
[params.about]
title = "@caodoc"
description = "Student, Junior Developer, Competitive Programming Contestant."
logo = "images/avatar.png"

# Sidebar: social links
# Available icon sets:
# * FontAwesome 6 <https://fontawesome.com/> ('fa-brands', 'fa-normal', or 'fa-solid' for brands)
# * Academicons <https://jpswalsh.github.io/academicons> ('ai ai-')

# Contact bar
[[params.socialLinks]]
icon = "fa-brands fa-github"
title = "GitHub"
url = "https://github.com/caodoc"

[[params.socialLinks]]
icon = "fa-brands fa-discord"
title = "Discord"
url = "https://discord.com/users/800173074166710282"

[[params.socialLinks]]
icon = "fa-brands fa-steam"
title = "Steam"
url = "https://steamcommunity.com/id/caodoc"

[menu]

  [[menu.main]]
    identifier = "notes"
    name = "notes"
    url = "/notes/"
    weight = 20

  [[menu.main]]
    identifier = "repo"
    name = "repo"
    url = "/repo/"
    weight = 10

[taxonomies]
category = "categories"
tag = "tags"
series = "series"

# For hugo >= 0.60.0, enable inline HTML
[markup.goldmark.renderer]
unsafe = true

[markup]

  # Table of contents
  # Add toc = true to content front matter to enable
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
    ordered    = true